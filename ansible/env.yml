          PORT=3001
          MONGO_URI=mongodb+srv://santosharma:2TNVQJuGsJvRy0pT@travelmemorydb.0kzvz9q.mongodb.net/travelmemory

    - name: Create frontend .env file
      copy:
        dest: /opt/travelmemory/frontend/.env
